version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NVM_DIR="$HOME/.nvm"
        - '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"'
        - nvm install 20
        - nvm use 20
        - corepack enable
        - corepack prepare pnpm@10.26.1 --activate
        - pnpm -v
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile --prefer-offline
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - node_modules/**/*
